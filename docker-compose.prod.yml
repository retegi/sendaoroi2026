services:
  web:
    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8050:8000"
