{% load static i18n %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sendaoroi.org{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="min-h-screen bg-sendaoroi-sand/40 text-sendaoroi-blue antialiased">
  {% include "includes/header.html" %}
  <main class="mx-auto w-full max-w-6xl px-4 pb-8 md:pb-10">
    {% block content %}{% endblock %}
  </main>
  {% include "includes/footer.html" %}
  {% include "includes/cookie_banner.html" %}
  <script src="{% static 'js/cookie-consent.js' %}"></script>
</body>
</html>
